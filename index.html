<script>
// =============================================
// NUEVO CÓDIGO - World Cup 2026 (worldcup26.ir)
// =============================================

async function loadWC26Data() {
    console.log('[ROBERT NEWS] Cargando datos del Mundial...');

    try {
        // 1. Cargar GRUPOS
        const groupsRes = await fetch('https://worldcup26.ir/get/groups');
        const groupsData = await groupsRes.json();

        // 2. Cargar PARTIDOS
        const gamesRes = await fetch('https://worldcup26.ir/get/games');
        const gamesData = await gamesRes.json();

        console.log('[ROBERT NEWS] Grupos cargados:', groupsData);
        console.log('[ROBERT NEWS] Partidos cargados:', gamesData);

        // Actualizar tabla de grupos
        updateGroupsTable(groupsData);

    } catch (error) {
        console.error('[ROBERT NEWS] Error cargando datos:', error);
    }
}

// Función que actualiza la tabla de grupos
function updateGroupsTable(groupsData) {
    const container = document.getElementById('groupsGrid');
    if (!container) return;

    let html = '';

    groupsData.forEach(group => {
        const letter = group.name || group.group || '?';
        const teams = group.teams || group.standings || [];

        // Ordenar por puntos (de mayor a menor)
        teams.sort((a, b) => (b.points || 0) - (a.points || 0));

        let rows = '';
        teams.forEach((team, index) => {
            const isColombia = team.name && team.name.toLowerCase().includes('colombia');
            const posClass = index === 0 ? 'p1' : index === 1 ? 'p2' : '';
            const rowClass = index < 2 ? 'q' : 'out';

            rows += `
                <tr class="${rowClass}">
                    <td>
                        <span class="pos ${posClass}">${index + 1}</span> 
                        ${team.flag || ''} 
                        ${isColombia ? `<b style="color:#f5c518">${team.name}</b>` : (team.name || 'Equipo')}
                    </td>
                    <td>${team.played || 0}</td>
                    <td>${team.won || 0}</td>
                    <td>${team.drawn || 0}</td>
                    <td>${team.lost || 0}</td>
                    <td>${(team.goals_for || 0) - (team.goals_against || 0)}</td>
                    <td><span class="pts">${team.points || 0}</span></td>
                </tr>
            `;
        });

        html += `
            <div class="gc">
                <div class="gc-h">
                    <span class="gc-l">Grupo ${letter}</span>
                </div>
                <table class="gt">
                    <thead>
                        <tr>
                            <th>Equipo</th>
                            <th>PJ</th>
                            <th>G</th>
                            <th>E</th>
                            <th>P</th>
                            <th>GD</th>
                            <th>Pts</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            </div>
        `;
    });

    container.innerHTML = html;
}

// ======================
// Ejecutar el código
// ======================
loadWC26Data();                    // Carga al abrir la página
setInterval(loadWC26Data, 60000);  // Actualiza cada 60 segundos
</script>
